version: 2.1

orbs:
  node: circleci/node@6

executors:
  go:
    docker:
      - image: cimg/go:1.24
    resource_class: medium

jobs:
  test-go:
    executor: go
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-v1-{{ checksum "go.sum" }}
      - run:
          name: Download modules
          command: go mod download
      - save_cache:
          key: go-mod-v1-{{ checksum "go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod
      - run:
          name: Run tests
          command: go test ./...
      - run:
          name: Build binaries
          command: make build

  lint-go:
    executor: go
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-v1-{{ checksum "go.sum" }}
      - run:
          name: Download modules
          command: go mod download
      - run:
          name: Install golangci-lint
          command: |
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
              | sh -s -- -b $(go env GOPATH)/bin v1.64.8
      - run:
          name: Lint
          command: golangci-lint run ./...

  build-ui:
    docker:
      - image: cimg/node:22.19
    resource_class: medium
    steps:
      - checkout
      - node/install-packages:
          app-dir: ui
          pkg-manager: npm
      - run:
          name: Lint
          command: npm run lint --prefix ui
      - run:
          name: Build
          command: npm run build --prefix ui

workflows:
  ci:
    jobs:
      - test-go
      - lint-go
      - build-ui
