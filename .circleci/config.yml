version: 2.1

executors:
  go:
    docker:
      - image: cimg/go:1.24
    resource_class: medium
  node:
    docker:
      - image: cimg/node:20.11
    resource_class: medium

jobs:
  test-and-vet-go:
    executor: go
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-v1-{{ checksum "go.sum" }}
      - run:
          name: Download modules
          command: go mod download
      - save_cache:
          key: go-mod-v1-{{ checksum "go.sum" }}
          paths:
            - /home/circleci/go/pkg/mod
      - run:
          name: Run go vet
          command: go vet ./...
      - run:
          name: Run tests
          command: go test ./...

  lint-ui:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v1-{{ checksum "ui/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd ui && npm ci
      - save_cache:
          key: node-deps-v1-{{ checksum "ui/package-lock.json" }}
          paths:
            - ui/node_modules
      - run:
          name: Run frontend lint
          command: cd ui && npm run lint

  build-ui:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v1-{{ checksum "ui/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd ui && npm ci
      - save_cache:
          key: node-deps-v1-{{ checksum "ui/package-lock.json" }}
          paths:
            - ui/node_modules
      - run:
          name: Build UI
          command: cd ui && npm run build

workflows:
  ci:
    jobs:
      - test-and-vet-go
      - lint-ui
      - build-ui
