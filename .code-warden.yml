# Custom instructions to guide the AI's review process.
custom_instructions:
  - "Pay close attention to Go best practices, especially regarding error handling and context propagation."
  - "The project uses the 'slog' package from the standard library for structured logging. Ensure all new logging statements follow this standard."
  - "Maintain a clean architecture: all business logic goes into `internal/` (e.g., `internal/rag`, `internal/jobs`). Never put core logic in `cmd/`."
  - "External dependencies (LLMs, Databases, GitHub) MUST be defined as interfaces in the core logic. Inject concrete implementations via `internal/wire`."
  - "When adding executing subprocesses (e.g., `exec.CommandContext`), verify that it's safe to run and use the comment `//nolint:gosec // G204: <reason>` to suppress linter false positives."
  - "To run unit tests successfully, run `make test`. Ensure any added functionality is thoroughly tested using the `testing` package."

# Directories to completely exclude from indexing. This is for performance.
# These are added to the application's built-in defaults like '.git' and 'node_modules'.
exclude_dirs:
  - ".vscode"
  - "keys"        # Private keys and certificates
  - "reviews"     # Generated review history
  - ".agent"      # Local agent/workflow state
  - "bin"         # Compiled binaries
  - "vendor"      # Dependency source code
  - "scripts"     # Utility scripts, often not core logic
  - "mocks"       # Generated mock code
  - ".github"     # CI configuration
  - "embeddings"  # Script service for local embeddings

# File extensions to exclude from indexing.
exclude_exts:
  - ".sum"         # Dependency checksums
  - ".sql"         # Database migrations (unless needed for RAG)
  - ".prompt"      # Prompt templates (can lead to confusing RAG results)
  - ".log"         # Log files
  - ".exe"         # Windows binaries
  - ".dll"         # Windows libraries
  - ".so"          # Linux libraries
  - ".tmp"         # Temporary files

# Specific files to exclude from indexing by their relative path.
exclude_files:
  - ".code-warden.yml" # The config itself
  - "config.yaml"      # Secrets/Local config
  - "config.yaml.example"
  - ".gitignore"
  - "go.mod"           # Build metadata
  - ".golangci.yml"    # Linter config
  - "Dockerfile"
  - "docker-compose.yml"
  - "Makefile"
